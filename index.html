<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense & Budget Visualizer</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header with Theme Toggle -->
      <div class="header">
        <h1 class="title">Expense &amp; Budget Visualizer</h1>
        <button id="theme-toggle" class="btn-theme" aria-label="Toggle theme">
          🌙 Dark
        </button>
      </div>

      <!-- Balance -->
      <div class="glass-panel card center">
        <p class="label">TOTAL BALANCE</p>
        <h2 class="balance" id="balance-display">$0.00</h2>
      </div>

      <!-- Budget Limit -->
      <div class="glass-panel card">
        <div class="form-group">
          <label for="budget-limit">Budget Limit ($)</label>
          <input
            type="number"
            id="budget-limit"
            placeholder="Set budget limit (optional)"
            min="0"
            step="0.01"
          />
        </div>
      </div>

      <!-- Form -->
      <div class="glass-panel card">
        <h3>Add Transaction</h3>

        <!-- Error message container -->
        <div
          id="error-message"
          class="error-message"
          role="alert"
          aria-live="polite"
        ></div>

        <form id="transaction-form">
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" placeholder="e.g. Coffee" />
          </div>

          <div class="form-group">
            <label for="item-amount">Amount</label>
            <input
              type="number"
              id="item-amount"
              placeholder="e.g. 5.00"
              min="0.01"
              step="0.01"
            />
          </div>

          <div class="form-group">
            <label for="item-category">Category</label>
            <select id="item-category">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>

          <button type="submit" class="btn-main">Add Transaction</button>
        </form>
      </div>

      <!-- Sort Control -->
      <div class="glass-panel card sort-bar">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="none">Default</option>
          <option value="amount-asc">Amount (Low → High)</option>
          <option value="amount-desc">Amount (High → Low)</option>
          <option value="category-az">Category (A–Z)</option>
        </select>
      </div>

      <!-- Bottom Section -->
      <div class="bottom">
        <!-- Transactions -->
        <div class="glass-panel card">
          <h3>Transactions</h3>
          <div id="transaction-list">
            <!-- Empty state -->
            <p id="empty-state" class="empty-state">
              No transactions yet. Add one above!
            </p>
          </div>
        </div>

        <!-- Chart -->
        <div class="glass-panel card center">
          <h3>Spending by Category</h3>
          <div class="chart-wrapper">
            <canvas id="spending-chart"></canvas>
            <p id="chart-fallback" class="chart-fallback" style="display: none">
              Chart unavailable
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
